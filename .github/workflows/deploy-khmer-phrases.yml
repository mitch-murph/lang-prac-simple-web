name: Deploy khmer-phrases

on:
  push:
    branches: [main]
    paths:
      - 'khmer-phrases/index.html'
      - 'khmer-phrases/admin.html'
      - 'khmer-phrases/khmer_phrases.csv'
      - 'khmer-phrases/khmer_phrases_filtered.csv'
      - 'khmer-phrases/audio/**'
      - '.github/workflows/deploy-khmer-phrases.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync static assets to S3 under /khmer-phrases/ prefix
        run: |
          aws s3 sync khmer-phrases/ s3://${{ secrets.S3_BUCKET_NAME }}/khmer-phrases/ \
            --delete \
            --exclude "*" \
            --include "audio/**" \
            --include "khmer_phrases.csv" \
            --include "khmer_phrases_filtered.csv" \
            --include "admin.html"
          aws s3 cp khmer-phrases/index.html s3://${{ secrets.S3_BUCKET_NAME }}/khmer-phrases/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
