<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Khmer Phrases</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
  .page-wrap { max-width: 960px; margin: 0 auto; padding: 0 24px; }
  header { background: #1a1a2e; color: #fff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  #stats { font-size: 0.9rem; opacity: 0.8; }
  #drill-bar { padding: 12px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; }
  #drill-settings { max-width: 960px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 0.88rem; color: #444; }
  #drill-settings label { display: flex; align-items: center; gap: 8px; }
  #drill-settings input[type=range] { width: 120px; cursor: pointer; accent-color: #1a1a2e; }
  #drill-settings span { font-weight: 600; min-width: 36px; display: inline-block; }
  #content { padding: 24px 0 40px; }
  .category-block { background: #fff; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow: hidden; }
  .category-header { background: #1a1a2e; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .category-header h2 { font-size: 1rem; font-weight: 600; }
  .category-body { display: block; }
  .category-body.collapsed { display: none; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #f0f0f0; padding: 8px 12px; text-align: left; font-size: 0.82rem; color: #555; border-bottom: 1px solid #ddd; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:hover { background: #f9f9f9; }
  td { padding: 9px 12px; font-size: 0.9rem; vertical-align: middle; }
  td.play-col, td.triple-col, td.slow-col { width: 42px; text-align: center; }
  td.english { font-weight: 500; }
  td.khmer { font-family: 'Khmer', 'Noto Sans Khmer', sans-serif; font-size: 1rem; }
  td.phonetic { color: #555; font-style: italic; }
  .play-btn { background: none; border: none; cursor: pointer; font-size: 1.3rem; padding: 2px 4px; line-height: 1; border-radius: 4px; transition: transform 0.1s; }
  .play-btn:hover { transform: scale(1.2); }
  .play-btn.playing { color: #2d6a4f; }
  .drill-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 2px 4px; line-height: 1; border-radius: 4px; transition: transform 0.1s; }
  .drill-btn:hover { transform: scale(1.2); }
  .drill-btn.playing { color: #2d6a4f; }
  .admin-link { color: #fff; opacity: 0.8; font-size: 0.9rem; text-decoration: none; border: 1px solid rgba(255,255,255,0.4); padding: 5px 14px; border-radius: 6px; }
  .admin-link:hover { opacity: 1; }
  #loading { padding: 60px 24px; text-align: center; color: #888; }
  #progress-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; }
  #progress-overlay.active { display:flex; }
  #progress-box { background:#fff; border-radius:12px; padding:28px 36px; min-width:320px; text-align:center; }
  #progress-box h3 { margin-bottom:14px; font-size:1rem; color:#1a1a2e; }
  #progress-bar-wrap { background:#e0e0e0; border-radius:99px; height:10px; overflow:hidden; margin-bottom:10px; }
  #progress-bar-fill { background:#2d6a4f; height:100%; width:0%; transition:width 0.2s; border-radius:99px; }
  #progress-label { font-size:0.85rem; color:#666; }
  .export-btn { background: #2d6a4f; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.88rem; cursor: pointer; font-weight: 600; }
  .export-btn:hover { background: #1f4f3a; }
  .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .play-all-btn { background: #1a1a2e; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.88rem; cursor: pointer; font-weight: 600; }
  .play-all-btn:hover { background: #2d2d52; }
  .play-all-btn.active { background: #c0392b; }
  .play-all-btn.active:hover { background: #922b21; }
  .lock-btn { background: #4a4a6a; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.88rem; cursor: pointer; font-weight: 600; }
  .lock-btn:hover { background: #5c5c88; }
  .lock-btn.active { background: #c0392b; }
  .lock-btn.active:hover { background: #922b21; }
  /* Segmented button groups */
  .btn-group { display: inline-flex; align-items: stretch; border-radius: 7px; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }
  .btn-group .play-all-btn,
  .btn-group .lock-btn { border-radius: 0; box-shadow: none; border-right: 1px solid rgba(255,255,255,0.18); }
  .btn-group .play-all-btn:first-child,
  .btn-group .lock-btn:first-child { border-radius: 7px 0 0 7px; }
  .btn-group .play-all-btn:last-child,
  .btn-group .lock-btn:last-child { border-radius: 0 7px 7px 0; border-right: none; }
  .drill-bar-group { display: flex; align-items: center; gap: 8px; }
  .drill-bar-group-label { font-size: 0.78rem; color: #666; font-weight: 600; white-space: nowrap; }
  #now-playing-bar { display:none; background:#2d6a4f; color:#fff; font-size:0.82rem; padding:6px 24px; text-align:center; }
  #now-playing-bar.visible { display:block; }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    header h1 { font-size: 1rem; }
    .page-wrap { padding: 0 12px; }
    #drill-settings { gap: 10px; }
    #drill-settings label { flex: 1 1 auto; min-width: 0; }
    #drill-settings input[type=range] { width: 100%; max-width: 130px; }
    .drill-bar-group { flex: 1 1 auto; }
    .btn-group { display: flex; width: 100%; }
    .btn-group .play-all-btn,
    .btn-group .lock-btn { flex: 1; text-align: center; justify-content: center; }
    #content { padding: 16px 0 32px; }
    .category-header { padding: 10px 12px; }
    table thead { display: none; }
    /* Each row becomes a horizontal card: text block left, buttons right */
    table tbody tr {
      display: flex; flex-wrap: nowrap; align-items: center;
      padding: 10px 12px; gap: 10px;
      border-bottom: 1px solid #e8e8e8;
    }
    table tbody tr td { display: block; padding: 0; border: none; }
    /* Text group stretches to fill space */
    td.english  { order: 1; flex: 1 1 auto; font-size: 0.95rem; font-weight: 500; }
    td.khmer    { order: 2; flex: 1 1 auto; font-size: 1rem; }
    td.phonetic { order: 3; flex: 1 1 auto; font-size: 0.78rem; color: #666; font-style: italic; }
    /* Wrap english+khmer+phonetic into a column */
    td.english, td.khmer, td.phonetic { display: block; }
    /* Fake column wrapper via a grid on the row */
    table tbody tr {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto;
      align-items: center;
    }
    td.english  { grid-column: 1; grid-row: 1; }
    td.khmer    { grid-column: 1; grid-row: 2; }
    td.phonetic { grid-column: 1; grid-row: 3; }
    /* Buttons column: stacked vertically on the right */
    td.play-col, td.triple-col, td.slow-col {
      grid-column: 2;
      display: flex; justify-content: center; align-items: center;
      width: auto; padding: 0;
    }
    td.play-col   { grid-row: 1; }
    td.triple-col { grid-row: 2; }
    td.slow-col   { grid-row: 3; }
    .play-btn  { font-size: 1.4rem; padding: 2px 4px; }
    .drill-btn {
      font-size: 0.82rem; padding: 4px 8px; font-weight: 700;
      background: #f0f0f0; border-radius: 6px; border: 1px solid #ddd; color: #333;
    }
    .drill-btn.playing { background: #d4edda; border-color: #2d6a4f; color: #2d6a4f; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-id3-writer/dist/browser-id3-writer.min.js"></script>
</head>
<body>

<div id="progress-overlay">
  <div id="progress-box">
    <h3>Building drill audio ZIP...</h3>
    <div id="progress-bar-wrap"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">0 / 0</div>
  </div>
</div>

<header>
  <h1>🇰🇭 Khmer Phrases</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="stats"></span>
    <a href="admin.html" class="admin-link">⚙ Admin</a>
  </div>
</header>

<div id="drill-bar">
  <div id="drill-settings">
    <label>
      Slow: <input type="range" id="slow-speed" min="0.40" max="0.95" value="0.87" step="0.01" oninput="document.getElementById('slow-speed-val').textContent=Math.round(this.value*100)+'%'">
      <span id="slow-speed-val">87%</span>
    </label>
    <label>
      Pause: <input type="range" id="pause-dur" min="0.5" max="4" value="2" step="0.1" oninput="document.getElementById('pause-dur-val').textContent=this.value+'s'">
      <span id="pause-dur-val">2s</span>
    </label>
    <div class="drill-bar-group">
      <span class="drill-bar-group-label">▶ Play all:</span>
      <div class="btn-group">
        <button class="play-all-btn" id="play-order-btn" onclick="togglePlayAll(false)">⇛ In Order</button>
        <button class="play-all-btn" id="play-shuffle-btn" onclick="togglePlayAll(true)">🔀 Shuffle</button>
      </div>
    </div>
    <div class="drill-bar-group">
      <span class="drill-bar-group-label">🔒 Lock screen:</span>
      <div class="btn-group">
        <button class="lock-btn" id="lock-order-btn" onclick="togglePlayAllMerged(false)">⇛ In Order</button>
        <button class="lock-btn" id="lock-shuffle-btn" onclick="togglePlayAllMerged(true)">🔀 Shuffle</button>
      </div>
    </div>
    <button class="export-btn" id="export-btn" onclick="exportAllDrill()">⬇ ZIP</button>
  </div>
</div>
<div id="now-playing-bar"></div>

<div class="page-wrap">
  <div id="content">
    <div id="loading">Loading phrases...</div>
  </div>
</div>

<script>
let allRows = [];
let currentAudio = null;
let currentPlayId = null;
let currentDrillSource = null;
let currentDrillId = null;
let playAllQueue = [];
let playAllIndex = -1;
let playAllActive = false;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function init() {
  // 1. Try sessionStorage + base CSV (server mode)
  const saved = (() => { try { return JSON.parse(sessionStorage.getItem('khmer_visibility') || 'null'); } catch(e) { return null; } })();

  if (saved) {
    try {
      const r = await fetch('/khmer_phrases.csv');
      if (r.ok) {
        const text = await r.text();
        loadFromBase(text, saved);
        return;
      }
    } catch(e) {}
  }

  // 2. Fall back to khmer_phrases_filtered.csv (S3 / static mode)
  try {
    const r = await fetch('khmer_phrases_filtered.csv');
    if (r.ok) { loadFromFiltered(await r.text()); return; }
  } catch(e) {}

  document.getElementById('loading').textContent = '❌ Could not load phrases. Open Admin first or provide khmer_phrases_filtered.csv.';
}

function parseCsv(text) {
  return text.split(/\r?\n/).filter(l => l.trim()).map(line => {
    const fields = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { fields.push(cur); cur = ''; }
      else cur += c;
    }
    fields.push(cur); return fields;
  });
}

function loadFromBase(text, visMap) {
  const [, ...data] = parseCsv(text);
  allRows = data.map((r, i) => ({
    id: i, category: r[0]||'', english: r[1]||'', khmer: r[2]||'', phonetic: r[3]||'', audioFile: r[4]||'',
    visible: visMap[i] !== undefined ? visMap[i] : true,
  })).filter(r => r.visible);
  render();
}

function loadFromFiltered(text) {
  const [, ...data] = parseCsv(text);
  allRows = data
    .map((r, i) => ({
      id: i, category: r[0]||'', english: r[1]||'', khmer: r[2]||'', phonetic: r[3]||'', audioFile: r[4]||'',
      visible: String(r[5]).toLowerCase() !== 'false',
    }))
    .filter(r => r.visible);
  render();
}

function render() {
  const grouped = {};
  for (const row of allRows) {
    if (!grouped[row.category]) grouped[row.category] = [];
    grouped[row.category].push(row);
  }
  const content = document.getElementById('content');
  content.innerHTML = '';
  document.getElementById('stats').textContent = `${allRows.length} phrases · ${Object.keys(grouped).length} categories`;

  for (const [cat, rows] of Object.entries(grouped)) {
    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `
      <div class="category-header" onclick="toggleCollapse(this)">
        <h2>${escHtml(cat)} <span style="opacity:0.6;font-weight:400;font-size:0.85rem">(${rows.length})</span></h2>
      </div>
      <div class="category-body">
        <table>
          <thead><tr>
            <th class="play-col" title="Normal speed">▶</th>
            <th class="triple-col" title="Normal × slow × normal">×3</th>
            <th class="slow-col" title="Slow speed ×1">🐢</th>
            <th>English</th>
            <th>Khmer</th>
            <th>Phonetic</th>
          </tr></thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                <td class="play-col">${row.audioFile ? `<button class="play-btn" id="play-${row.id}" onclick="playAudio(${row.id})" title="Normal speed">▶</button>` : ''}</td>
                <td class="triple-col">${row.audioFile ? `<button class="drill-btn" id="play-triple-${row.id}" onclick="playTriple(${row.id})" title="Normal → slow → normal">×3</button>` : ''}</td>
                <td class="slow-col">${row.audioFile ? `<button class="drill-btn" id="play-slow-${row.id}" onclick="playSlow(${row.id})" title="Slow speed ×1">🐢</button>` : ''}</td>
                <td class="english">${escHtml(row.english)}</td>
                <td class="khmer">${escHtml(row.khmer)}</td>
                <td class="phonetic">${escHtml(row.phonetic)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    content.appendChild(block);
  }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleCollapse(header) { header.nextElementSibling.classList.toggle('collapsed'); }

function playAudio(id) {
  const row = allRows.find(r => r.id === id);
  if (!row || !row.audioFile) return;
  if (currentPlayId === id) {
    currentAudio.pause();
    document.getElementById('play-' + id).textContent = '▶';
    document.getElementById('play-' + id).classList.remove('playing');
    currentAudio = null; currentPlayId = null; return;
  }
  if (currentAudio) {
    currentAudio.pause();
    const prev = document.getElementById('play-' + currentPlayId);
    if (prev) { prev.textContent = '▶'; prev.classList.remove('playing'); }
  }
  const btn = document.getElementById('play-' + id);
  const audio = new Audio('audio/' + row.audioFile.replace(/\\/g, '/'));
  audio.play();
  btn.textContent = '⏹'; btn.classList.add('playing');
  currentAudio = audio; currentPlayId = id;
  audio.onended = () => { btn.textContent = '▶'; btn.classList.remove('playing'); currentAudio = null; currentPlayId = null; };
}

// ── Drill ──────────────────────────────────────────────────────────────────

async function loadAudioBuffer(url) {
  const res = await fetch(url);
  return await audioCtx.decodeAudioData(await res.arrayBuffer());
}

function createSilence(sec, sr) { return audioCtx.createBuffer(1, Math.floor(sec * sr), sr); }

function stretchBuffer(buf, speed) {
  const src = buf.getChannelData(0);
  const outLen = Math.floor(src.length / speed);
  const out = audioCtx.createBuffer(1, outLen, buf.sampleRate);
  const dst = out.getChannelData(0);
  for (let i = 0; i < outLen; i++) {
    const p = i * speed, lo = Math.floor(p), hi = Math.min(lo + 1, src.length - 1), f = p - lo;
    dst[i] = src[lo] * (1 - f) + src[hi] * f;
  }
  return out;
}

function concatBuffers(bufs, sr) {
  const total = bufs.reduce((s, b) => s + b.length, 0);
  const out = audioCtx.createBuffer(1, total, sr);
  const dst = out.getChannelData(0);
  let off = 0;
  for (const b of bufs) {
    const ch = b.numberOfChannels === 1 ? b.getChannelData(0) : (() => { const a = b.getChannelData(0), c = b.getChannelData(1), m = new Float32Array(b.length); for (let i=0;i<b.length;i++) m[i]=(a[i]+c[i])/2; return m; })();
    dst.set(ch, off); off += b.length;
  }
  return out;
}

async function buildTripleBuffer(row) {
  const speed = parseFloat(document.getElementById('slow-speed').value);
  const pauseDur = parseFloat(document.getElementById('pause-dur').value);
  const normal = await loadAudioBuffer('audio/' + row.audioFile.replace(/\\/g, '/'));
  const sr = normal.sampleRate;
  const pause = createSilence(pauseDur, sr);
  const slow = stretchBuffer(normal, speed);
  // normal → pause → slow → pause → normal
  return concatBuffers([createSilence(0.5, sr), normal, pause, slow, pause, normal, createSilence(0.5, sr)], sr);
}

async function buildSlowBuffer(row) {
  const speed = parseFloat(document.getElementById('slow-speed').value);
  const normal = await loadAudioBuffer('audio/' + row.audioFile.replace(/\\/g, '/'));
  const sr = normal.sampleRate;
  return concatBuffers([createSilence(0.5, sr), stretchBuffer(normal, speed), createSilence(0.5, sr)], sr);
}

function stopCurrentDrill() {
  if (currentDrillSource) {
    currentDrillSource.onended = null;
    try { currentDrillSource.stop(); } catch(e) {}
    const prevTriple = document.getElementById('play-triple-' + currentDrillId);
    const prevSlow   = document.getElementById('play-slow-'   + currentDrillId);
    if (prevTriple) { prevTriple.textContent = '×3'; prevTriple.classList.remove('playing'); }
    if (prevSlow)   { prevSlow.textContent   = '🐢'; prevSlow.classList.remove('playing'); }
    currentDrillSource = null; currentDrillId = null;
  }
}

async function playTriple(id) {
  const row = allRows.find(r => r.id === id);
  if (!row || !row.audioFile) return;
  stopPlayAll();
  const btn = document.getElementById('play-triple-' + id);
  if (currentDrillId === id && currentDrillSource) { stopCurrentDrill(); btn.textContent = '×3'; btn.classList.remove('playing'); return; }
  stopCurrentDrill();
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const buf = await buildTripleBuffer(row);
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start();
    btn.disabled = false; btn.textContent = '⏹'; btn.classList.add('playing');
    currentDrillSource = src; currentDrillId = id;
    src.onended = () => { btn.textContent = '×3'; btn.classList.remove('playing'); if (currentDrillId === id) { currentDrillSource = null; currentDrillId = null; } };
  } catch(e) { alert('Failed: ' + e.message); btn.disabled = false; btn.textContent = '×3'; }
}

async function playSlow(id) {
  const row = allRows.find(r => r.id === id);
  if (!row || !row.audioFile) return;
  stopPlayAll();
  const btn = document.getElementById('play-slow-' + id);
  if (currentDrillId === id && currentDrillSource) { stopCurrentDrill(); btn.textContent = '🐢'; btn.classList.remove('playing'); return; }
  stopCurrentDrill();
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const buf = await buildSlowBuffer(row);
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start();
    btn.disabled = false; btn.textContent = '⏹'; btn.classList.add('playing');
    currentDrillSource = src; currentDrillId = id;
    src.onended = () => { btn.textContent = '🐢'; btn.classList.remove('playing'); if (currentDrillId === id) { currentDrillSource = null; currentDrillId = null; } };
  } catch(e) { alert('Failed: ' + e.message); btn.disabled = false; btn.textContent = '🐢'; }
}

// ── Play All ────────────────────────────────────────────────────────────────

function stopPlayAll() {
  if (!playAllActive) return;
  playAllActive = false;
  stopCurrentDrill();
  playAllQueue = []; playAllIndex = -1;
  document.getElementById('play-order-btn').textContent = '▶▶ In Order';
  document.getElementById('play-order-btn').classList.remove('active');
  document.getElementById('play-shuffle-btn').textContent = '🔀 Shuffle';
  document.getElementById('play-shuffle-btn').classList.remove('active');
  document.getElementById('lock-order-btn').textContent = '▶▶ In Order';
  document.getElementById('lock-order-btn').classList.remove('active');
  document.getElementById('lock-shuffle-btn').textContent = '🔀 Shuffle';
  document.getElementById('lock-shuffle-btn').classList.remove('active');
  const bar = document.getElementById('now-playing-bar');
  bar.classList.remove('visible'); bar.textContent = '';
}

// Chained version — shows current phrase, requires screen on
function togglePlayAll(shuffle) {
  if (playAllActive) { stopPlayAll(); return; }
  const rows = allRows.filter(r => r.audioFile);
  if (!rows.length) { alert('No audio to play.'); return; }
  playAllQueue = shuffle ? [...rows].sort(() => Math.random() - 0.5) : [...rows];
  playAllIndex = 0;
  playAllActive = true;
  if (shuffle) { const b = document.getElementById('play-shuffle-btn'); b.textContent = '⏹ Stop'; b.classList.add('active'); }
  else         { const b = document.getElementById('play-order-btn');   b.textContent = '⏹ Stop'; b.classList.add('active'); }
  playNextInQueue();
}

async function playNextInQueue() {
  if (!playAllActive || playAllIndex >= playAllQueue.length) { stopPlayAll(); return; }
  const row = playAllQueue[playAllIndex];
  const bar = document.getElementById('now-playing-bar');
  bar.classList.add('visible');
  bar.textContent = `▶ ${playAllIndex + 1} / ${playAllQueue.length}  —  ${row.english}${row.phonetic ? '  (' + row.phonetic + ')' : ''}`;
  stopCurrentDrill();
  try {
    const buf = await buildTripleBuffer(row);
    if (!playAllActive) return;
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start();
    currentDrillSource = src; currentDrillId = row.id;
    src.onended = () => {
      if (!playAllActive) return;
      currentDrillSource = null; currentDrillId = null;
      playAllIndex++;
      playNextInQueue();
    };
  } catch(e) {
    playAllIndex++;
    playNextInQueue();
  }
}

// Merged version — pre-builds one single buffer, survives screen lock
async function togglePlayAllMerged(shuffle) {
  if (playAllActive) { stopPlayAll(); return; }
  const rows = allRows.filter(r => r.audioFile);
  if (!rows.length) { alert('No audio to play.'); return; }
  playAllQueue = shuffle ? [...rows].sort(() => Math.random() - 0.5) : [...rows];

  const overlay = document.getElementById('progress-overlay');
  const fill    = document.getElementById('progress-bar-fill');
  const label   = document.getElementById('progress-label');
  document.querySelector('#progress-box h3').textContent = 'Building playlist for lock screen…';
  fill.style.width = '0%'; label.textContent = '0 / ' + playAllQueue.length;
  overlay.classList.add('active');
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const bufs = [];
  for (let i = 0; i < playAllQueue.length; i++) {
    const row = playAllQueue[i];
    label.textContent = `${i + 1} / ${playAllQueue.length}  — ${row.english}`;
    fill.style.width = (i / playAllQueue.length * 100) + '%';
    await new Promise(r => setTimeout(r, 0));
    try { bufs.push(await buildTripleBuffer(row)); }
    catch(e) { console.warn('Skipping', row.english, e); }
  }

  fill.style.width = '100%'; label.textContent = 'Starting…';
  await new Promise(r => setTimeout(r, 0));
  overlay.classList.remove('active');
  document.querySelector('#progress-box h3').textContent = 'Building drill audio ZIP…';

  if (!bufs.length) return;

  const merged = concatBuffers(bufs, bufs[0].sampleRate);
  playAllActive = true;
  if (shuffle) { const b = document.getElementById('lock-shuffle-btn'); b.textContent = '⏹ Stop'; b.classList.add('active'); }
  else         { const b = document.getElementById('lock-order-btn');   b.textContent = '⏹ Stop'; b.classList.add('active'); }

  const bar = document.getElementById('now-playing-bar');
  bar.classList.add('visible');
  bar.textContent = `🔒 Playing ${playAllQueue.length} phrases — ${shuffle ? 'shuffled' : 'in order'} (lock-screen safe)`;

  const src = audioCtx.createBufferSource();
  src.buffer = merged; src.connect(audioCtx.destination); src.start();
  currentDrillSource = src; currentDrillId = -1;
  src.onended = () => { if (playAllActive) stopPlayAll(); };
}

// ── MP3 encode ────────────────────────────────────────────────────────────

function encodeToMp3(buffer) {
  const sr = buffer.sampleRate;
  const raw = buffer.getChannelData(0);
  const s16 = new Int16Array(raw.length);
  for (let i = 0; i < raw.length; i++) s16[i] = Math.max(-32768, Math.min(32767, raw[i] * 32767));
  const mp3enc = new lamejs.Mp3Encoder(1, sr, 128);
  const CHUNK = 1152;
  const chunks = [];
  for (let i = 0; i < s16.length; i += CHUNK) {
    const slice = s16.subarray(i, i + CHUNK);
    const d = mp3enc.encodeBuffer(slice);
    if (d.length > 0) chunks.push(new Uint8Array(d));
  }
  const end = mp3enc.flush();
  if (end.length > 0) chunks.push(new Uint8Array(end));
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out.buffer;
}

// ── Export all drill audio as ZIP ──────────────────────────────────────────

async function exportAllDrill() {
  const exportable = allRows.filter(r => r.audioFile);
  if (!exportable.length) { alert('No audio to export.'); return; }

  const btn = document.getElementById('export-btn');
  const overlay = document.getElementById('progress-overlay');
  const fill = document.getElementById('progress-bar-fill');
  const label = document.getElementById('progress-label');

  btn.disabled = true;
  overlay.classList.add('active');
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const zip = new JSZip();
  let done = 0;

  // Pre-compute per-category track counts
  const catCounts = {};
  const catIndex = {};
  for (const row of exportable) {
    catCounts[row.category] = (catCounts[row.category] || 0) + 1;
    catIndex[row.category] = 0;
  }

  for (const row of exportable) {
    label.textContent = `${done} / ${exportable.length}  — ${row.english}`;
    fill.style.width = (done / exportable.length * 100) + '%';
    await new Promise(r => setTimeout(r, 0)); // yield to UI

    try {
      const drillBuf = await buildTripleBuffer(row);
      const mp3Buf = encodeToMp3(drillBuf);

      catIndex[row.category]++;
      const trackNum = `${catIndex[row.category]}/${catCounts[row.category]}`;

      // Write ID3 tags
      const writer = new ID3Writer(mp3Buf);
      writer
        .setFrame('TIT2', row.english)
        .setFrame('TPE1', ['Loecsen'])
        .setFrame('TALB', 'Khmer Drill - ' + row.category)
        .setFrame('TCON', ['Language Learning'])
        .setFrame('TRCK', trackNum)
        .setFrame('COMM', { description: '', text: `${row.khmer}  [${row.phonetic}]`, language: 'eng' });
      writer.addTag();

      const catFolder = row.audioFile.replace(/[\\/][^\\/]+$/, '');
      const safeName = row.english.replace(/[<>:"/\\|?*]/g, '_');
      const phonPart  = row.phonetic ? ` (${row.phonetic})` : '';
      zip.folder(catFolder).file(`${safeName}${phonPart} [drill].mp3`, writer.arrayBuffer);
    } catch(e) {
      console.warn('Skipping', row.english, e);
    }

    done++;
  }

  fill.style.width = '100%';
  label.textContent = `Compressing ${done} files...`;
  await new Promise(r => setTimeout(r, 0));

  const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'khmer_drill_audio.zip';
  a.click();

  overlay.classList.remove('active');
  fill.style.width = '0%';
  btn.disabled = false;
}

init();
